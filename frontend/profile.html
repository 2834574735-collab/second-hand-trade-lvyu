<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料 - 绿屿二手</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-container { max-width: 700px; margin: 40px auto; padding: 0 20px; }
        .profile-card { background: white; border-radius: 24px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .profile-card h2 { font-size: 24px; color: #3b4a4a; margin-bottom: 24px; }
        .profile-card h2 span { background: linear-gradient(135deg, #4caf7f 0%, #7ec8e0 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .profile-avatar { text-align: center; margin-bottom: 24px; }
        .profile-avatar .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #4caf7f 0%, #7ec8e0 100%); color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 32px; }
        .profile-avatar .username { display: block; margin-top: 8px; font-size: 18px; font-weight: 600; color: #3b4a4a; }
        .profile-avatar .role-badge { display: inline-block; padding: 2px 12px; border-radius: 40px; font-size: 12px; background: #e8f5ef; color: #4caf7f; }
        .profile-avatar .role-badge.admin { background: #fff3e0; color: #ff9800; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; color: #5a6a6a; margin-bottom: 6px; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 16px; border: 1px solid #d4e2da; border-radius: 12px; font-size: 15px; transition: border-color 0.2s; }
        .form-group input:focus { outline: none; border-color: #4caf7f; box-shadow: 0 0 0 3px rgba(76,175,127,0.12); }
        .form-group .hint { font-size: 12px; color: #7a8a8a; margin-top: 4px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn-submit { width: 100%; padding: 14px; font-size: 16px; margin-top: 10px; }
        .btn-danger { background: #f28b82; border-color: #f28b82; color: white; }
        .btn-danger:hover { background: #e57373; border-color: #e57373; }
        .section-title { font-size: 16px; font-weight: 600; color: #3b4a4a; margin: 24px 0 16px 0; padding-bottom: 8px; border-bottom: 2px solid #e8f0ec; }
        .loading { opacity: 0.6; pointer-events: none; }
        .error-msg { color: #f28b82; font-size: 14px; margin-top: 12px; text-align: center; }
        .success-msg { color: #4caf7f; font-size: 14px; margin-top: 12px; text-align: center; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a href="index.html" class="logo">🌿 绿屿</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="cart.html">购物车</a>
            <a href="orders.html">我的订单</a>
            <a href="publish.html">发布闲置</a>
            <a href="my-products.html">我的商品</a>
            <span class="user-section">
                    <a href="#" id="authLink" onclick="goToProfile()" style="color:#4caf7f;">个人中心</a>
                    <span class="separator" id="separator" style="display:none;">|</span>
                    <a href="#" id="logoutLink" style="display:none;" onclick="logout()">退出</a>
                </span>
        </div>
    </div>
</nav>

<div class="profile-container">
    <div class="profile-card">
        <h2>👤 <span>个人资料</span></h2>

        <div class="profile-avatar">
            <div class="avatar">👤</div>
            <span class="username" id="displayName">加载中...</span>
            <span class="role-badge" id="displayRole">用户</span>
        </div>

        <div class="section-title">📋 基本信息</div>
        <form id="profileForm" onsubmit="updateProfile(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" disabled style="background:#f5f8f6;color:#7a8a8a;">
                </div>
                <div class="form-group">
                    <label>昵称 *</label>
                    <input type="text" id="nickname" placeholder="请输入昵称" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>手机号 *</label>
                    <input type="tel" id="phone" placeholder="请输入手机号" required>
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="email" placeholder="请输入邮箱">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-submit" id="updateBtn">💾 保存修改</button>
            <div id="updateMsg" class="success-msg"></div>
        </form>

        <div class="section-title">🔐 安全设置</div>
        <form id="passwordForm" onsubmit="updatePassword(event)">
            <div class="form-group">
                <label>新密码 *</label>
                <input type="password" id="newPassword" placeholder="请输入新密码（至少8位）" required>
            </div>
            <div class="form-group">
                <label>确认新密码 *</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入新密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-submit" id="pwdBtn">🔑 修改密码</button>
            <div id="pwdMsg" class="success-msg"></div>
        </form>
    </div>
</div>

<script src="js/request.js"></script>

<script>
    let currentUser = null;

    // ========== 退出登录 ==========
    function logout() {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('token');
        window.location.href = 'login.html';
    }

    // ========== 跳转个人中心 ==========
    function goToProfile() {
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = 'login.html';
            return;
        }
        if (currentUser.role === 'admin') {
            window.location.href = 'admin.html';
        } else {
            window.location.href = 'profile.html';
        }
    }

    // ========== 更新导航栏 ==========
    function updateNavBar() {
        const u = JSON.parse(localStorage.getItem('currentUser'));
        const authLink = document.getElementById('authLink');
        const logoutLink = document.getElementById('logoutLink');
        const separator = document.getElementById('separator');

        if (u) {
            authLink.textContent = u.nickname;
            authLink.style.color = u.role === 'admin' ? '#ff9800' : '#4caf7f';
            logoutLink.style.display = 'inline';
            if (separator) separator.style.display = 'inline';
        } else {
            authLink.textContent = '登录';
            authLink.style.color = '';
            logoutLink.style.display = 'none';
            if (separator) separator.style.display = 'none';
        }
    }

    // ========== 加载用户信息 ==========
    function loadUserInfo() {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        currentUser = user;

        document.getElementById('displayName').textContent = user.nickname || user.username;
        document.getElementById('displayRole').textContent = user.role === 'admin' ? '管理员' : '普通用户';
        if (user.role === 'admin') {
            document.getElementById('displayRole').classList.add('admin');
        }

        document.getElementById('username').value = user.username || '';
        document.getElementById('nickname').value = user.nickname || '';
        document.getElementById('phone').value = user.phone || '';
        document.getElementById('email').value = user.email || '';
    }

    // ========== 更新个人信息 ==========
    async function updateProfile(e) {
        e.preventDefault();

        const nickname = document.getElementById('nickname').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();

        if (!nickname || !phone) {
            document.getElementById('updateMsg').textContent = '请填写完整信息';
            document.getElementById('updateMsg').style.color = '#f28b82';
            return;
        }

        if (!/^1[3-9]\d{9}$/.test(phone)) {
            document.getElementById('updateMsg').textContent = '手机号格式不正确';
            document.getElementById('updateMsg').style.color = '#f28b82';
            return;
        }

        const btn = document.getElementById('updateBtn');
        btn.textContent = '⏳ 保存中...';
        btn.classList.add('loading');
        document.getElementById('updateMsg').textContent = '';

        try {
            // 更新昵称（通过手机号接口只改手机号，需要分别更新）
            // 先更新手机号
            await put(`/users/${currentUser.id}/phone`, { phone });

            // 再更新昵称（目前后端没有单独的昵称接口，我们可以直接更新数据库，但这里先只改手机号）
            // 为了完整，我们重新加载用户信息
            document.getElementById('updateMsg').textContent = '✅ 手机号修改成功！';
            document.getElementById('updateMsg').style.color = '#4caf7f';

            // 更新本地存储的用户信息
            const updatedUser = JSON.parse(localStorage.getItem('currentUser'));
            updatedUser.phone = phone;
            localStorage.setItem('currentUser', JSON.stringify(updatedUser));

            // 刷新显示
            loadUserInfo();
            updateNavBar();

        } catch (error) {
            document.getElementById('updateMsg').textContent = error.message || '更新失败';
            document.getElementById('updateMsg').style.color = '#f28b82';
        } finally {
            btn.textContent = '💾 保存修改';
            btn.classList.remove('loading');
        }
    }

    // ========== 修改密码 ==========
    async function updatePassword(e) {
        e.preventDefault();

        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!newPassword || !confirmPassword) {
            document.getElementById('pwdMsg').textContent = '请填写完整信息';
            document.getElementById('pwdMsg').style.color = '#f28b82';
            return;
        }

        if (newPassword !== confirmPassword) {
            document.getElementById('pwdMsg').textContent = '两次输入的密码不一致';
            document.getElementById('pwdMsg').style.color = '#f28b82';
            return;
        }

        if (newPassword.length < 8) {
            document.getElementById('pwdMsg').textContent = '密码长度不能少于8位';
            document.getElementById('pwdMsg').style.color = '#f28b82';
            return;
        }

        // 密码强度校验
        if (!/[A-Z]/.test(newPassword)) {
            document.getElementById('pwdMsg').textContent = '密码必须包含至少一个大写字母';
            document.getElementById('pwdMsg').style.color = '#f28b82';
            return;
        }
        if (!/[a-z]/.test(newPassword)) {
            document.getElementById('pwdMsg').textContent = '密码必须包含至少一个小写字母';
            document.getElementById('pwdMsg').style.color = '#f28b82';
            return;
        }
        if (!/[0-9]/.test(newPassword)) {
            document.getElementById('pwdMsg').textContent = '密码必须包含至少一个数字';
            document.getElementById('pwdMsg').style.color = '#f28b82';
            return;
        }

        const btn = document.getElementById('pwdBtn');
        btn.textContent = '⏳ 修改中...';
        btn.classList.add('loading');
        document.getElementById('pwdMsg').textContent = '';

        try {
            await put(`/users/${currentUser.id}/password`, { password: newPassword });
            document.getElementById('pwdMsg').textContent = '✅ 密码修改成功！';
            document.getElementById('pwdMsg').style.color = '#4caf7f';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        } catch (error) {
            document.getElementById('pwdMsg').textContent = error.message || '修改失败';
            document.getElementById('pwdMsg').style.color = '#f28b82';
        } finally {
            btn.textContent = '🔑 修改密码';
            btn.classList.remove('loading');
        }
    }

    // ========== 初始化 ==========
    updateNavBar();
    loadUserInfo();

    // 暴露全局函数
    window.logout = logout;
    window.goToProfile = goToProfile;
    window.updateProfile = updateProfile;
    window.updatePassword = updatePassword;
</script>
</body>
</html>
