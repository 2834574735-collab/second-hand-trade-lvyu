<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - 绿屿二手</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .orders-container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .orders-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .orders-header h2 { font-size: 24px; color: #3b4a4a; margin: 0; }
        .orders-header h2 span { background: linear-gradient(135deg, #4caf7f 0%, #7ec8e0 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .order-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .order-tabs button { padding: 8px 20px; border: 1px solid #d4e2da; border-radius: 40px; background: white; color: #5a6a6a; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .order-tabs button:hover { border-color: #4caf7f; }
        .order-tabs button.active { background: #4caf7f; color: white; border-color: #4caf7f; }
        .order-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 1px solid #e8f0ec; }
        .order-card .order-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid #e8f0ec; flex-wrap: wrap; gap: 8px; }
        .order-card .order-id { font-size: 13px; color: #7a8a8a; }
        .order-card .order-status { font-size: 14px; font-weight: 600; }
        .order-card .order-status.pending { color: #ff9800; }
        .order-card .order-status.shipped { color: #2196f3; }
        .order-card .order-status.completed { color: #4caf7f; }
        .order-card .order-status.cancelled { color: #9e9e9e; }
        .order-card .order-status.refund { color: #f44336; }
        .order-card .order-body { display: flex; align-items: center; gap: 16px; padding: 16px 0; }
        .order-card .order-img { width: 80px; height: 80px; border-radius: 12px; background: #f5f8f6; display: flex; align-items: center; justify-content: center; font-size: 32px; flex-shrink: 0; }
        .order-card .order-info { flex: 1; }
        .order-card .order-title { font-weight: 500; color: #3b4a4a; margin-bottom: 4px; }
        .order-card .order-meta { font-size: 13px; color: #7a8a8a; }
        .order-card .order-price { font-weight: 600; color: #4caf7f; font-size: 18px; }
        .order-card .order-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .order-card .order-actions button { padding: 6px 16px; border-radius: 40px; border: 1px solid #d4e2da; background: white; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .order-card .order-actions button:hover { border-color: #4caf7f; background: #f8fcf9; }
        .order-card .order-actions button.btn-primary { background: #4caf7f; color: white; border-color: #4caf7f; }
        .order-card .order-actions button.btn-primary:hover { background: #43a047; }
        .order-card .order-actions button.btn-danger { border-color: #f28b82; color: #f28b82; }
        .order-card .order-actions button.btn-danger:hover { background: #fef5f4; }
        .order-card .order-footer { padding-top: 12px; border-top: 1px solid #e8f0ec; font-size: 13px; color: #7a8a8a; text-align: right; }
        .empty-state { text-align: center; padding: 60px 20px; color: #7a8a8a; }
        .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 16px; }
        .loading { opacity: 0.6; pointer-events: none; }
        .role-switch { display: flex; gap: 12px; align-items: center; }
        .role-switch label { font-size: 14px; color: #5a6a6a; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .role-switch input[type="radio"] { accent-color: #4caf7f; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a href="index.html" class="logo">🌿 绿屿</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="cart.html">购物车</a>
            <a href="orders.html" style="color:#4caf7f;">我的订单</a>
            <a href="publish.html">发布闲置</a>
            <a href="my-products.html">我的商品</a>
            <span class="user-section">
                    <a href="#" id="authLink" onclick="goToProfile()">登录</a>
                    <span class="separator" id="separator" style="display:none;">|</span>
                    <a href="#" id="logoutLink" style="display:none;" onclick="logout()">退出</a>
                </span>
        </div>
    </div>
</nav>

<div class="orders-container">
    <div class="orders-header">
        <h2>📋 <span>我的订单</span></h2>
        <div class="role-switch">
            <label><input type="radio" name="role" value="buyer" checked onchange="loadOrders()"> 我买的</label>
            <label><input type="radio" name="role" value="seller" onchange="loadOrders()"> 我卖的</label>
        </div>
    </div>

    <div class="order-tabs" id="orderTabs">
        <button class="active" data-status="all" onclick="filterOrders('all')">全部</button>
        <button data-status="待付款" onclick="filterOrders('待付款')">待付款</button>
        <button data-status="待发货" onclick="filterOrders('待发货')">待发货</button>
        <button data-status="待收货" onclick="filterOrders('待收货')">待收货</button>
        <button data-status="已完成" onclick="filterOrders('已完成')">已完成</button>
        <button data-status="已取消" onclick="filterOrders('已取消')">已取消</button>
    </div>

    <div id="ordersList"></div>
</div>

<script src="js/request.js"></script>

<script>
    let allOrders = [];
    let currentStatus = 'all';
    let currentRole = 'buyer';

    // ========== 退出登录 ==========
    function logout() {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('token');
        window.location.href = 'login.html';
    }

    // ========== 跳转个人中心 ==========
    function goToProfile() {
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = 'login.html';
            return;
        }
        if (currentUser.role === 'admin') {
            window.location.href = 'admin.html';
        } else {
            window.location.href = 'profile.html';
        }
    }

    // ========== 更新导航栏 ==========
    function updateNavBar() {
        const u = JSON.parse(localStorage.getItem('currentUser'));
        const authLink = document.getElementById('authLink');
        const logoutLink = document.getElementById('logoutLink');
        const separator = document.getElementById('separator');

        if (u) {
            authLink.textContent = u.nickname;
            authLink.style.color = u.role === 'admin' ? '#ff9800' : '#4caf7f';
            logoutLink.style.display = 'inline';
            if (separator) separator.style.display = 'inline';
        } else {
            authLink.textContent = '登录';
            authLink.style.color = '';
            logoutLink.style.display = 'none';
            if (separator) separator.style.display = 'none';
        }
    }

    // ========== 加载订单 ==========
    async function loadOrders() {
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = 'login.html';
            return;
        }

        const role = document.querySelector('input[name="role"]:checked').value;
        currentRole = role;

        try {
            const result = await get(`/orders?role=${role}`);
            allOrders = result.data;
            renderOrders(currentStatus);
        } catch (error) {
            console.error('加载订单失败:', error);
            document.getElementById('ordersList').innerHTML = `<div class="empty-state"><div class="emoji">⚠️</div><p>加载失败: ${error.message}</p></div>`;
        }
    }

    // ========== 渲染订单 ==========
    function renderOrders(status) {
        const container = document.getElementById('ordersList');
        let filtered = allOrders;

        if (status !== 'all') {
            filtered = filtered.filter(o => o.status === status);
        }

        if (!filtered.length) {
            container.innerHTML = `<div class="empty-state"><div class="emoji">📭</div><h3>暂无订单</h3><p>快去逛逛吧~</p></div>`;
            return;
        }

        container.innerHTML = filtered.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <span class="order-id">订单号：${order.id}</span>
                        <span class="order-status ${getStatusClass(order.status)}">${order.status}</span>
                    </div>
                    <div class="order-body">
                        <div class="order-img">${order.image || '📦'}</div>
                        <div class="order-info">
                            <div class="order-title">${escapeHtml(order.title)}</div>
                            <div class="order-meta">数量：1 | ${order.create_time ? new Date(order.create_time).toLocaleString() : ''}</div>
                        </div>
                        <div class="order-price">¥${order.total_amount || 0}</div>
                    </div>
                    <div class="order-actions">
                        ${getOrderActions(order)}
                    </div>
                    ${order.express_no ? `<div class="order-footer">📦 物流单号：${order.express_no}</div>` : ''}
                </div>
            `).join('');
    }

    // ========== 获取状态样式 ==========
    function getStatusClass(status) {
        const map = {
            '待付款': 'pending',
            '待发货': 'shipped',
            '待收货': 'shipped',
            '已完成': 'completed',
            '已取消': 'cancelled',
            '已退款': 'refund'
        };
        return map[status] || '';
    }

    // ========== 获取订单操作按钮 ==========
    function getOrderActions(order) {
        let actions = '';

        if (order.status === '待付款' && currentRole === 'buyer') {
            actions += `<button onclick="cancelOrder(${order.id})" class="btn-danger">取消订单</button>`;
            actions += `<button onclick="payOrder(${order.id})" class="btn-primary">去付款</button>`;
        }

        if (order.status === '待发货' && currentRole === 'seller') {
            actions += `<button onclick="shipOrder(${order.id})" class="btn-primary">发货</button>`;
        }

        if (order.status === '待收货' && currentRole === 'buyer') {
            actions += `<button onclick="confirmOrder(${order.id})" class="btn-primary">确认收货</button>`;
        }

        if (order.status === '已完成' && currentRole === 'buyer') {
            actions += `<button onclick="requestRefund(${order.id})" class="btn-danger">申请退款</button>`;
        }

        if (order.status === '退款中' && currentRole === 'seller') {
            actions += `<button onclick="handleRefund(${order.id}, 'confirm')" class="btn-primary">同意退款</button>`;
            actions += `<button onclick="handleRefund(${order.id}, 'reject')" class="btn-danger">拒绝退款</button>`;
        }

        return actions || `<span style="color:#7a8a8a;font-size:13px;">暂无操作</span>`;
    }

    // ========== 取消订单 ==========
    async function cancelOrder(orderId) {
        if (!confirm('确定要取消该订单吗？')) return;
        try {
            await put(`/orders/${orderId}/cancel`);
            alert('订单已取消');
            loadOrders();
        } catch (error) {
            alert(error.message);
        }
    }

    // ========== 付款 ==========
    async function payOrder(orderId) {
        try {
            await put(`/orders/${orderId}`, { status: '待发货' });
            alert('付款成功！等待卖家发货');
            loadOrders();
        } catch (error) {
            alert(error.message);
        }
    }

    // ========== 发货 ==========
    async function shipOrder(orderId) {
        const expressNo = prompt('请输入物流单号：');
        if (expressNo === null) return;
        if (!expressNo.trim()) {
            alert('请输入物流单号');
            return;
        }
        try {
            await put(`/orders/${orderId}`, { status: '待收货', expressNo: expressNo.trim() });
            alert('发货成功！');
            loadOrders();
        } catch (error) {
            alert(error.message);
        }
    }

    // ========== 确认收货 ==========
    async function confirmOrder(orderId) {
        if (!confirm('确认已收到商品？')) return;
        try {
            await put(`/orders/${orderId}`, { status: '已完成' });
            alert('收货成功！感谢您的购买');
            loadOrders();
        } catch (error) {
            alert(error.message);
        }
    }

    // ========== 申请退款 ==========
    async function requestRefund(orderId) {
        if (!confirm('确定要申请退款吗？')) return;
        try {
            await put(`/orders/${orderId}`, { status: '退款中' });
            alert('退款申请已提交，等待卖家处理');
            loadOrders();
        } catch (error) {
            alert(error.message);
        }
    }

    // ========== 处理退款 ==========
    async function handleRefund(orderId, action) {
        const text = action === 'confirm' ? '同意退款' : '拒绝退款';
        if (!confirm(`确定要${text}吗？`)) return;
        try {
            await put(`/orders/${orderId}/refund`, { action });
            alert(`${text}成功`);
            loadOrders();
        } catch (error) {
            alert(error.message);
        }
    }

    // ========== 筛选订单 ==========
    function filterOrders(status) {
        currentStatus = status;
        document.querySelectorAll('.order-tabs button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.status === status);
        });
        renderOrders(status);
    }

    // ========== HTML 转义 ==========
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== 初始化 ==========
    updateNavBar();
    loadOrders();

    // 暴露全局函数
    window.logout = logout;
    window.goToProfile = goToProfile;
    window.loadOrders = loadOrders;
    window.filterOrders = filterOrders;
    window.cancelOrder = cancelOrder;
    window.payOrder = payOrder;
    window.shipOrder = shipOrder;
    window.confirmOrder = confirmOrder;
    window.requestRefund = requestRefund;
    window.handleRefund = handleRefund;
</script>
</body>
</html>
