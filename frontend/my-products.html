<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的商品 - 绿屿</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .status-filter { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
        .filter-btn { padding: 8px 20px; border: 1px solid #e0ede6; background: white; border-radius: 40px; cursor: pointer; }
        .filter-btn.active { background: #4caf7f; color: white; border-color: #4caf7f; }
        .product-status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .status-在售 { background: #e8f5e9; color: #2e7d64; }
        .status-待审核 { background: #fff3e0; color: #ff9800; }
        .status-已下架 { background: #eeeeee; color: #999; }
        .product-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .product-actions button { padding: 6px 12px; font-size: 12px; }
        .loading { text-align: center; padding: 50px; color: #7a8a8a; }
        .image-upload-area { border: 2px dashed #e0ede6; border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; margin-top: 10px; }
        .image-upload-area:hover { border-color: #4caf7f; background: #f8fcf9; }
        .image-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .preview-img { width: 60px; height: 60px; background: #f0f5f2; border-radius: 8px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .preview-img img { width: 100%; height: 100%; object-fit: cover; }
        .remove-img { position: absolute; top: -6px; right: -6px; width: 16px; height: 16px; background: #f28b82; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }
        .edit-loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">🌿 绿屿</a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="cart.html">购物车</a>
                <a href="orders.html">我的订单</a>
                <a href="publish.html">发布闲置</a>
                <a href="my-products.html">我的商品</a>
                <span class="user-section">
                    <a href="#" id="authLink" onclick="goToProfile()">登录</a>
                    <span class="separator" id="separator" style="display:none;">|</span>
                    <a href="#" id="logoutLink" style="display:none;" onclick="logout()">退出</a>
                </span>
            </div>
        </div>
    </nav>
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin:30px 0 20px;">
            <h1>📦 我的商品</h1>
            <a href="publish.html" class="btn btn-primary">+ 发布新商品</a>
        </div>
        <div class="status-filter">
            <button class="filter-btn active" data-status="all">全部</button>
            <button class="filter-btn" data-status="在售">在售</button>
            <button class="filter-btn" data-status="待审核">待审核</button>
            <button class="filter-btn" data-status="已下架">已下架</button>
        </div>
        <div class="product-grid" id="productsGrid"><div class="loading">加载中...</div></div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content" style="max-width:500px; max-height:90vh; overflow-y:auto;">
            <h3>编辑商品</h3>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group"><label>商品标题 *</label><input type="text" id="editTitle" maxlength="30" required></div>
                <div class="form-group"><label>分类 *</label>
                    <select id="editCategory" required>
                        <option value="">请选择</option>
                        <option value="数码">数码</option>
                        <option value="服饰">服饰</option>
                        <option value="图书">图书</option>
                        <option value="生活">生活用品</option>
                    </select>
                </div>
                <div class="form-group"><label>描述</label><textarea id="editDescription" rows="3" maxlength="500"></textarea></div>
                <div class="form-group"><label>价格 *</label><input type="number" id="editPrice" step="0.01" min="0.01" required></div>
                <div class="form-group"><label>可售件数 *</label><input type="number" id="editStock" step="1" min="1" required></div>
                <div class="form-group"><label>成色 *</label>
                    <select id="editCondition" required>
                        <option value="">请选择</option>
                        <option value="全新">全新</option>
                        <option value="99新">99新</option>
                        <option value="95新">95新</option>
                        <option value="九成新">九成新</option>
                        <option value="八成新">八成新</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>商品图片</label>
                    <div class="image-upload-area" id="editUploadArea">📸 点击更换图片<input type="file" id="editImageInput" accept="image/*" style="display:none;"></div>
                    <div class="image-preview" id="editImagePreview"></div>
                </div>
                <div style="display:flex; gap:12px; margin-top:20px;">
                    <button type="button" class="btn btn-outline" onclick="closeEditModal()" style="flex:1">取消</button>
                    <button type="submit" class="btn btn-primary" id="editSubmitBtn" style="flex:2">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/request.js"></script>

    <script>
        let products = [];

        // ========== 加载我的商品 ==========
        async function loadMyProducts() {
            try {
                const currentUser = JSON.parse(localStorage.getItem('currentUser'));
                if (!currentUser) {
                    window.location.href = 'login.html';
                    return;
                }

                const result = await get('/my-products');
                products = result.data;
                renderProducts();
            } catch (error) {
                console.error('加载商品失败:', error);
                document.getElementById('productGrid').innerHTML = '<div class="empty-state"><div class="emoji">📦</div><h3>加载失败</h3><p>' + error.message + '</p></div>';
            }
        }

        // ========== 渲染商品列表 ==========
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            if (!products.length) {
                grid.innerHTML = '<div class="empty-state"><div class="emoji">📦</div><h3>还没有发布商品</h3><p>去发布你的第一个闲置吧~</p></div>';
                return;
            }
            // ... 渲染逻辑
        }

        // ========== 下架商品 ==========
        async function offShelf(productId) {
            if (!confirm('确定要下架该商品吗？')) return;
            try {
                await put(`/products/${productId}/off`);
                alert('下架成功');
                loadMyProducts();
            } catch (error) {
                alert(error.message);
            }
        }

        // ========== 重新上架 ==========
        async function onShelf(productId) {
            if (!confirm('确定要重新上架该商品吗？')) return;
            try {
                await put(`/products/${productId}/on`);
                alert('已提交审核');
                loadMyProducts();
            } catch (error) {
                alert(error.message);
            }
        }

        // ========== 跳转编辑 ==========
        function editProduct(id) {
            window.location.href = `publish.html?id=${id}`;
        }

        // ========== 初始化 ==========
        loadMyProducts();
    </script>
</body>
</html>
