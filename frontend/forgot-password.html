<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 绿屿</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .forgot-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #e8f5ef 0%, #d4e8df 100%);
        }
        .forgot-card {
            background: white;
            padding: 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(76, 175, 127, 0.12);
        }
        .forgot-card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #3b4a4a;
        }
        .forgot-card h2 span {
            background: linear-gradient(135deg, #4caf7f 0%, #7ec8e0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .step {
            transition: all 0.3s;
        }
        .code-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .code-input-group input {
            flex: 1;
        }
        .code-input-group button {
            white-space: nowrap;
            padding: 12px 16px;
        }
        .countdown {
            color: #f28b82;
            font-size: 12px;
            margin-top: 8px;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #4caf7f;
            text-decoration: none;
        }
        .error-msg {
            color: #f28b82;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="forgot-card">
            <h2>🔐 <span>找回密码</span></h2>
            
            <!-- 步骤1：输入账号 -->
            <div id="step1" class="step">
                <div class="form-group">
                    <label>用户名 / 手机号</label>
                    <input type="text" id="account" placeholder="请输入用户名或手机号">
                </div>
                <button class="btn btn-primary" style="width:100%" id="sendBtn" onclick="sendCode()">发送验证码</button>
                <div class="back-link"><a href="login.html">← 返回登录</a></div>
                <div id="step1Error" class="error-msg"></div>
            </div>
            
            <!-- 步骤2：输入验证码 -->
            <div id="step2" class="step" style="display:none;">
                <div class="form-group">
                    <label>验证码</label>
                    <div class="code-input-group">
                        <input type="text" id="code" placeholder="请输入6位验证码" maxlength="6">
                        <button id="resendBtn" class="btn btn-outline" onclick="resendCode()" disabled>60秒后重发</button>
                    </div>
                    <div id="countdown" class="countdown"></div>
                </div>
                <button class="btn btn-primary" style="width:100%" onclick="verifyCode()">验证</button>
                <div class="back-link"><a href="login.html">← 返回登录</a></div>
                <div id="step2Error" class="error-msg"></div>
            </div>
            
            <!-- 步骤3：设置新密码 -->
            <div id="step3" class="step" style="display:none;">
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" id="newPassword" placeholder="6-20位">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="confirmPassword" placeholder="再次输入新密码">
                </div>
                <button class="btn btn-primary" style="width:100%" id="resetBtn" onclick="resetPassword()">确认重置</button>
                <div class="back-link"><a href="login.html">← 返回登录</a></div>
                <div id="step3Error" class="error-msg"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let userId = null;
        let countdownInterval = null;

        // 发送验证码
        async function sendCode() {
            const account = document.getElementById('account').value.trim();
            const sendBtn = document.getElementById('sendBtn');
            const errorMsg = document.getElementById('step1Error');
            
            if (!account) {
                errorMsg.textContent = '请输入用户名或手机号';
                return;
            }
            
            sendBtn.textContent = '发送中...';
            sendBtn.classList.add('loading');
            errorMsg.textContent = '';
            
            try {
                const response = await fetch(`${API_URL}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ account })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    userId = result.userId;
                    alert('验证码已发送到您的邮箱，请查收');
                    
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    startCountdown(60);
                } else {
                    errorMsg.textContent = result.message;
                }
            } catch (error) {
                console.error('发送失败:', error);
                errorMsg.textContent = '网络错误，请确保后端服务已启动';
            } finally {
                sendBtn.textContent = '发送验证码';
                sendBtn.classList.remove('loading');
            }
        }
        
        // 倒计时
        function startCountdown(seconds) {
            let countdownSeconds = seconds;
            const resendBtn = document.getElementById('resendBtn');
            const countdownEl = document.getElementById('countdown');
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            resendBtn.disabled = true;
            
            countdownInterval = setInterval(() => {
                countdownSeconds--;
                if (countdownSeconds <= 0) {
                    clearInterval(countdownInterval);
                    resendBtn.disabled = false;
                    resendBtn.textContent = '重新发送';
                    countdownEl.textContent = '';
                } else {
                    resendBtn.textContent = `${countdownSeconds}秒后重发`;
                    countdownEl.textContent = `验证码有效，${countdownSeconds}秒后可重新获取`;
                }
            }, 1000);
        }
        
        // 重新发送
        async function resendCode() {
            const account = document.getElementById('account').value.trim();
            
            try {
                const response = await fetch(`${API_URL}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ account })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    userId = result.userId;
                    alert('验证码已重新发送到您的邮箱');
                    
                    if (countdownInterval) clearInterval(countdownInterval);
                    startCountdown(60);
                } else {
                    alert(result.message);
                }
            } catch (error) {
                alert('发送失败，请重试');
            }
        }
        
        // 验证验证码
        async function verifyCode() {
            const code = document.getElementById('code').value.trim();
            const errorMsg = document.getElementById('step2Error');
            
            if (!code) {
                errorMsg.textContent = '请输入验证码';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/verify-reset-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, code })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('step2').style.display = 'none';
                    document.getElementById('step3').style.display = 'block';
                    if (countdownInterval) clearInterval(countdownInterval);
                } else {
                    errorMsg.textContent = result.message;
                }
            } catch (error) {
                errorMsg.textContent = '验证失败，请重试';
            }
        }
        
        // 重置密码
        async function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetBtn = document.getElementById('resetBtn');
            const errorMsg = document.getElementById('step3Error');
            
            if (!newPassword) {
                errorMsg.textContent = '请输入新密码';
                return;
            }
            
            if (newPassword.length < 6) {
                errorMsg.textContent = '密码长度不能少于6位';
                return;
            }
            
            if (newPassword !== confirmPassword) {
                errorMsg.textContent = '两次输入的密码不一致';
                return;
            }
            
            resetBtn.textContent = '重置中...';
            resetBtn.classList.add('loading');
            errorMsg.textContent = '';
            
            try {
                const response = await fetch(`${API_URL}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, newPassword })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('密码重置成功！请使用新密码登录');
                    window.location.href = 'login.html';
                } else {
                    errorMsg.textContent = result.message;
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请重试';
            } finally {
                resetBtn.textContent = '确认重置';
                resetBtn.classList.remove('loading');
            }
        }
        
        // 暴露全局函数
        window.sendCode = sendCode;
        window.resendCode = resendCode;
        window.verifyCode = verifyCode;
        window.resetPassword = resetPassword;
    </script>
</body>
</html>
