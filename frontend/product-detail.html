<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情 - 绿屿二手</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .detail-container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .detail-card { background: white; border-radius: 24px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
        .detail-image { display: flex; align-items: center; justify-content: center; background: #f8fcf9; border-radius: 16px; min-height: 300px; font-size: 80px; }
        .detail-image img { max-width: 100%; max-height: 400px; border-radius: 16px; object-fit: contain; }
        .detail-info h2 { font-size: 24px; color: #3b4a4a; margin: 0 0 8px 0; }
        .detail-info .price { font-size: 28px; font-weight: 700; color: #4caf7f; margin: 12px 0; }
        .detail-info .meta { display: flex; flex-wrap: wrap; gap: 16px; font-size: 14px; color: #7a8a8a; margin-bottom: 16px; }
        .detail-info .meta span { background: #f5f8f6; padding: 4px 12px; border-radius: 40px; }
        .detail-info .description { background: #f8fcf9; padding: 16px; border-radius: 12px; margin: 16px 0; color: #5a6a6a; line-height: 1.6; }
        .detail-info .seller-info { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-top: 1px solid #e8f0ec; border-bottom: 1px solid #e8f0ec; margin: 16px 0; }
        .detail-info .seller-info .avatar { width: 40px; height: 40px; border-radius: 50%; background: #4caf7f; color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .detail-actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .detail-actions button { flex: 1; padding: 12px 24px; border-radius: 40px; border: none; cursor: pointer; font-size: 16px; transition: all 0.2s; min-width: 120px; }
        .btn-cart { background: #e8f5ef; color: #4caf7f; border: 1px solid #4caf7f; }
        .btn-cart:hover { background: #d4ece2; }
        .btn-buy { background: #4caf7f; color: white; }
        .btn-buy:hover { background: #43a047; }
        .btn-edit { background: #ff9800; color: white; }
        .btn-edit:hover { background: #fb8c00; }
        .btn-sold { background: #9e9e9e; color: white; cursor: not-allowed; }
        .btn-back { background: #f5f5f5; color: #5a6a6a; border: 1px solid #d4e2da; }
        .btn-back:hover { background: #e8e8e8; }
        .loading { opacity: 0.6; pointer-events: none; }
        .error-msg { color: #f28b82; text-align: center; padding: 20px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #7a8a8a; }
        .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 16px; }

        @media (max-width: 700px) {
            .detail-card { grid-template-columns: 1fr; gap: 20px; }
            .detail-image { min-height: 200px; font-size: 60px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a href="index.html" class="logo">🌿 绿屿</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="cart.html">购物车</a>
            <a href="orders.html">我的订单</a>
            <a href="publish.html">发布闲置</a>
            <a href="my-products.html">我的商品</a>
            <span class="user-section">
                    <a href="#" id="authLink" onclick="goToProfile()">登录</a>
                    <span class="separator" id="separator" style="display:none;">|</span>
                    <a href="#" id="logoutLink" style="display:none;" onclick="logout()">退出</a>
                </span>
        </div>
    </div>
</nav>

<div class="detail-container">
    <div id="detailContent">
        <div class="empty-state"><div class="emoji">⏳</div><h3>加载中...</h3></div>
    </div>
</div>

<script src="js/request.js"></script>

<script>
    // ========== 退出登录 ==========
    function logout() {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('token');
        window.location.href = 'login.html';
    }

    // ========== 跳转个人中心 ==========
    function goToProfile() {
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = 'login.html';
            return;
        }
        if (currentUser.role === 'admin') {
            window.location.href = 'admin.html';
        } else {
            window.location.href = 'profile.html';
        }
    }

    // ========== 更新导航栏 ==========
    function updateNavBar() {
        const u = JSON.parse(localStorage.getItem('currentUser'));
        const authLink = document.getElementById('authLink');
        const logoutLink = document.getElementById('logoutLink');
        const separator = document.getElementById('separator');

        if (u) {
            authLink.textContent = u.nickname;
            authLink.style.color = u.role === 'admin' ? '#ff9800' : '#4caf7f';
            logoutLink.style.display = 'inline';
            if (separator) separator.style.display = 'inline';
        } else {
            authLink.textContent = '登录';
            authLink.style.color = '';
            logoutLink.style.display = 'none';
            if (separator) separator.style.display = 'none';
        }
    }

    // ========== 加载商品详情 ==========
    async function loadProductDetail() {
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');

        if (!productId) {
            document.getElementById('detailContent').innerHTML = `<div class="empty-state"><div class="emoji">❌</div><h3>缺少商品ID</h3></div>`;
            return;
        }

        try {
            const result = await get(`/products/${productId}`);
            renderProduct(result.data);
        } catch (error) {
            document.getElementById('detailContent').innerHTML = `<div class="empty-state"><div class="emoji">⚠️</div><h3>加载失败</h3><p>${error.message}</p></div>`;
        }
    }

    // ========== 渲染商品详情 ==========
    function renderProduct(product) {
        const container = document.getElementById('detailContent');
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        const isOwner = currentUser && currentUser.id === product.seller_id;
        const isAdmin = currentUser && currentUser.role === 'admin';
        const isSold = product.status !== '在售';

        container.innerHTML = `
                <div class="detail-card">
                    <div class="detail-image">
                        ${product.image && product.image !== '📦' ? `<img src="${product.image}" alt="${product.title}">` : '📦'}
                    </div>
                    <div class="detail-info">
                        <h2>${escapeHtml(product.title)}</h2>
                        <div class="price">¥${product.price}</div>
                        <div class="meta">
                            <span>📂 ${product.category || '未分类'}</span>
                            <span>🔍 ${product.condition || '未知'}</span>
                            <span>📦 库存 ${product.stock || 0}</span>
                            <span>${product.status === '在售' ? '🟢 在售' : '🔴 已下架'}</span>
                        </div>
                        <div class="seller-info">
                            <div class="avatar">👤</div>
                            <div>
                                <div style="font-weight:500;">${escapeHtml(product.seller_name || '未知卖家')}</div>
                                <div style="font-size:13px;color:#7a8a8a;">卖家信用 ${product.credit || 80}</div>
                            </div>
                        </div>
                        ${product.description ? `<div class="description">${escapeHtml(product.description)}</div>` : ''}
                        <div class="detail-actions">
                            ${renderActions(product, isOwner, isAdmin, isSold)}
                        </div>
                    </div>
                </div>
            `;
    }

    // ========== 渲染操作按钮 ==========
    function renderActions(product, isOwner, isAdmin, isSold) {
        let html = `<button class="btn-back" onclick="history.back()">← 返回</button>`;

        if (isSold) {
            html += `<button class="btn-sold" disabled>已下架</button>`;
            return html;
        }

        if (isOwner || isAdmin) {
            html += `<button class="btn-edit" onclick="editProduct(${product.id})">✏️ 编辑</button>`;
            html += `<button class="btn-cart" onclick="toggleShelf(${product.id})">${product.status === '在售' ? '下架' : '上架'}</button>`;
            return html;
        }

        // 普通用户
        html += `<button class="btn-cart" onclick="addToCart(${product.id})">🛒 加入购物车</button>`;
        html += `<button class="btn-buy" onclick="buyNow(${product.id})">⚡ 立即购买</button>`;
        return html;
    }

    // ========== 加入购物车 ==========
    async function addToCart(productId) {
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            alert('请先登录');
            window.location.href = 'login.html';
            return;
        }

        try {
            await post('/cart', { productId, quantity: 1 });
            alert('已添加到购物车！');
        } catch (error) {
            alert(error.message);
        }
    }

    // ========== 立即购买 ==========
    function buyNow(productId) {
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            alert('请先登录');
            window.location.href = 'login.html';
            return;
        }
        window.location.href = `checkout.html?productId=${productId}`;
    }

    // ========== 编辑商品 ==========
    function editProduct(productId) {
        window.location.href = `publish.html?id=${productId}`;
    }

    // ========== 下架/上架 ==========
    async function toggleShelf(productId) {
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            alert('请先登录');
            window.location.href = 'login.html';
            return;
        }

        try {
            // 先获取商品当前状态
            const result = await get(`/products/${productId}`);
            const product = result.data;

            if (product.status === '在售') {
                await put(`/products/${productId}/off`);
                alert('商品已下架');
            } else {
                await put(`/products/${productId}/on`);
                alert('已提交审核，等待管理员审核');
            }
            loadProductDetail(); // 刷新页面
        } catch (error) {
            alert(error.message);
        }
    }

    // ========== HTML 转义 ==========
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== 初始化 ==========
    updateNavBar();
    loadProductDetail();

    // 暴露全局函数
    window.logout = logout;
    window.goToProfile = goToProfile;
    window.addToCart = addToCart;
    window.buyNow = buyNow;
    window.editProduct = editProduct;
    window.toggleShelf = toggleShelf;
    window.loadProductDetail = loadProductDetail;
</script>
</body>
</html>
