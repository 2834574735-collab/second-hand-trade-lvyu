<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 绿屿二手</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(145deg, #e8f5ef 0%, #d4e8df 100%); }
        .login-card { background: white; padding: 40px; border-radius: 32px; width: 100%; max-width: 420px; box-shadow: 0 20px 40px rgba(76, 175, 127, 0.12); }
        .login-card h2 { text-align: center; margin-bottom: 32px; color: #3b4a4a; font-size: 28px; }
        .login-card h2 span { background: linear-gradient(135deg, #4caf7f 0%, #7ec8e0 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .login-card .btn-primary { width: 100%; padding: 14px; font-size: 16px; margin-top: 10px; }
        .register-link { text-align: center; margin-top: 24px; font-size: 14px; }
        .register-link a { color: #4caf7f; text-decoration: none; }
        .forgot-link { text-align: center; margin-top: 12px; font-size: 14px; }
        .forgot-link a { color: #7a8a8a; text-decoration: none; }
        .forgot-link a:hover { color: #4caf7f; }
        .error-msg { color: #f28b82; font-size: 14px; margin-top: 16px; text-align: center; }
        .divider { display: flex; align-items: center; margin: 24px 0; color: #c0d6cc; font-size: 12px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #e0ede6; }
        .divider span { padding: 0 12px; }
        .admin-login { background: #f8fcf9; border-radius: 20px; padding: 16px; margin-top: 8px; }
        .admin-login-title { font-size: 14px; font-weight: 500; color: #7a8a8a; margin-bottom: 12px; }
        .admin-buttons { display: flex; gap: 12px; }
        .btn-admin { flex: 1; background: #f0f4f2; border: 1px solid #d4e2da; padding: 10px; border-radius: 40px; cursor: pointer; }
        .btn-admin:hover { background: #e6ede8; border-color: #4caf7f; }
        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>🌿 <span>绿屿二手</span></h2>
            <form id="loginForm">
                <div class="form-group"><label>手机号 / 用户名</label><input type="text" id="username" placeholder="请输入手机号或用户名" required></div>
                <div class="form-group"><label>密码</label><input type="password" id="password" placeholder="请输入密码" required></div>
                <button type="submit" class="btn btn-primary" id="loginBtn">🔐 登录</button>
                <div id="errorMsg" class="error-msg"></div>
            </form>
            
            <!-- 忘记密码链接 -->
            <div class="forgot-link">
                <a href="forgot-password.html">忘记密码？</a>
            </div>
            
            <div class="divider"><span>或</span></div>
            <div class="admin-login">
                <div class="admin-login-title">🛡️ 管理员快捷入口</div>
                <div class="admin-buttons">
                    <button class="btn-admin" onclick="adminLogin('admin', 'admin123')">👨‍💼 管理员登录</button>
                    <button class="btn-admin" onclick="adminLogin('admin2', 'admin123')">👩‍💼 备用管理员</button>
                </div>
                <div style="font-size: 12px; color: #c0d6cc; margin-top: 12px; text-align: center;">测试账号：admin / admin123</div>
            </div>
            <div class="register-link"><a href="register.html">还没有账号？立即注册</a></div>
        </div>
    </div>

    <script src="js/request.js"></script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            loginBtn.textContent = '登录中...';
            loginBtn.classList.add('loading');
            errorMsg.textContent = '';

            try {
                // ✅ 使用 request.js 中的 post 方法
                const result = await post('/login', { username, password });

                // 保存 Token 和用户信息
                localStorage.setItem('token', result.data.token);
                localStorage.setItem('currentUser', JSON.stringify(result.data.user));

                // 跳转
                if (result.data.user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                errorMsg.textContent = error.message || '登录失败';
            } finally {
                loginBtn.textContent = '🔐 登录';
                loginBtn.classList.remove('loading');
            }
        });

        async function adminLogin(username, password) {
            const errorMsg = document.getElementById('errorMsg');

            try {
                // ✅ 使用 request.js 中的 post 方法
                const result = await post('/login', { username, password });

                if (result.data.user.role === 'admin') {
                    localStorage.setItem('token', result.data.token);
                    localStorage.setItem('currentUser', JSON.stringify(result.data.user));
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.textContent = '管理员账号或密码错误';
                }
            } catch (error) {
                errorMsg.textContent = error.message || '网络错误，请确保后端服务已启动';
            }
        }

        window.adminLogin = adminLogin;
    </script>
</body>
</html>
