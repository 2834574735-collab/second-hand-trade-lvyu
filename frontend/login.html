<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 绿屿二手</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ========== 登录页面样式 ========== */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #e8f5ef 0%, #d4e8df 100%);
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(76, 175, 127, 0.12);
            transition: transform 0.2s;
        }

        .login-card:hover {
            transform: translateY(-2px);
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 32px;
            color: #3b4a4a;
            font-size: 28px;
        }

        .login-card h2 span {
            background: linear-gradient(135deg, #4caf7f 0%, #7ec8e0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .login-card .btn-primary {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .login-card .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(76, 175, 127, 0.3);
        }

        .login-card .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .register-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
        }

        .register-link a {
            color: #4caf7f;
            text-decoration: none;
            transition: color 0.2s;
        }

        .register-link a:hover {
            color: #388e3c;
            text-decoration: underline;
        }

        .forgot-link {
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
        }

        .forgot-link a {
            color: #7a8a8a;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link a:hover {
            color: #4caf7f;
        }

        .error-msg {
            color: #f28b82;
            font-size: 14px;
            margin-top: 16px;
            text-align: center;
            min-height: 24px;
        }

        .success-msg {
            color: #4caf7f;
            font-size: 14px;
            margin-top: 16px;
            text-align: center;
            min-height: 24px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #c0d6cc;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e0ede6;
        }

        .divider span {
            padding: 0 12px;
        }

        .admin-login {
            background: #f8fcf9;
            border-radius: 20px;
            padding: 16px;
            margin-top: 8px;
        }

        .admin-login-title {
            font-size: 14px;
            font-weight: 500;
            color: #7a8a8a;
            margin-bottom: 12px;
        }

        .admin-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-admin {
            flex: 1;
            background: #f0f4f2;
            border: 1px solid #d4e2da;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-admin:hover {
            background: #e6ede8;
            border-color: #4caf7f;
        }

        .btn-admin:active {
            transform: scale(0.97);
        }

        /* ========== 加载状态 ========== */
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e0ede6;
            border-top-color: #4caf7f;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ========== 响应式 ========== */
        @media (max-width: 480px) {
            .login-card {
                padding: 24px 20px;
            }

            .login-card h2 {
                font-size: 22px;
            }

            .admin-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <!-- ========== 标题 ========== -->
        <h2>🌿 <span>绿屿二手</span></h2>

        <!-- ========== 登录表单 ========== -->
        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="username">手机号 / 用户名</label>
                <input
                        type="text"
                        id="username"
                        placeholder="请输入手机号或用户名"
                        required
                        autocomplete="username"
                        autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input
                        type="password"
                        id="password"
                        placeholder="请输入密码"
                        required
                        autocomplete="current-password"
                >
            </div>

            <button
                    type="submit"
                    class="btn btn-primary"
                    id="loginBtn"
            >
                🔐 登录
            </button>

            <div id="errorMsg" class="error-msg"></div>
        </form>

        <!-- ========== 忘记密码 ========== -->
        <div class="forgot-link">
            <a href="forgot-password.html">🔑 忘记密码？</a>
        </div>

        <!-- ========== 分割线 ========== -->
        <div class="divider"><span>或</span></div>

        <!-- ========== 管理员登录 ========== -->
        <div class="admin-login">
            <div class="admin-login-title">🛡️ 管理员快捷入口</div>
            <div class="admin-buttons">
                <button class="btn-admin" data-admin="admin" data-password="admin123">
                    👨‍💼 管理员登录
                </button>
                <button class="btn-admin" data-admin="admin2" data-password="admin123">
                    👩‍💼 备用管理员
                </button>
            </div>
            <div style="font-size: 12px; color: #c0d6cc; margin-top: 12px; text-align: center;">
                💡 测试账号：admin / admin123
            </div>
        </div>

        <!-- ========== 注册入口 ========== -->
        <div class="register-link">
            <a href="register.html">还没有账号？立即注册 →</a>
        </div>
    </div>
</div>

<!-- ========== JavaScript ========== -->
<script src="js/request.js"></script>
<script>
    /**
     * ============================================
     * 绿屿二手 - 登录页面逻辑
     * 技术栈：原生 JS + request.js (封装 fetch)
     * ============================================
     */

    (function() {
        'use strict';

        // ========== DOM 引用 ==========
        const DOM = {
            form: document.getElementById('loginForm'),
            username: document.getElementById('username'),
            password: document.getElementById('password'),
            loginBtn: document.getElementById('loginBtn'),
            errorMsg: document.getElementById('errorMsg'),
            adminBtns: document.querySelectorAll('.btn-admin'),
        };

        // ========== 工具函数 ==========

        /** 显示错误消息 */
        function showError(message) {
            DOM.errorMsg.textContent = message || '登录失败，请重试';
            DOM.errorMsg.className = 'error-msg';
        }

        /** 清空错误消息 */
        function clearError() {
            DOM.errorMsg.textContent = '';
            DOM.errorMsg.className = 'error-msg';
        }

        /** 设置按钮加载状态 */
        function setLoading(isLoading) {
            if (isLoading) {
                DOM.loginBtn.disabled = true;
                DOM.loginBtn.classList.add('loading');
                DOM.loginBtn.innerHTML = '<span class="spinner"></span>登录中...';
            } else {
                DOM.loginBtn.disabled = false;
                DOM.loginBtn.classList.remove('loading');
                DOM.loginBtn.textContent = '🔐 登录';
            }
        }

        /** 保存登录状态 */
        function saveSession(user, token) {
            localStorage.setItem('token', token);
            localStorage.setItem('currentUser', JSON.stringify(user));
        }

        /** 跳转页面 */
        function redirectToDashboard(user) {
            const target = user.role === 'admin' ? 'admin.html' : 'index.html';
            window.location.href = target;
        }

        // ========== 核心登录逻辑 ==========

        /**
         * 执行登录
         * @param {string} username - 用户名/手机号
         * @param {string} password - 密码
         */
        async function performLogin(username, password) {
            clearError();
            setLoading(true);

            try {
                const result = await post('/login', { username, password });

                // 登录成功
                saveSession(result.data.user, result.data.token);
                redirectToDashboard(result.data.user);

            } catch (error) {
                // 登录失败
                showError(error.message || '用户名或密码错误');
            } finally {
                setLoading(false);
            }
        }

        // ========== 事件绑定 ==========

        /** 表单提交事件 */
        DOM.form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = DOM.username.value.trim();
            const password = DOM.password.value.trim();

            // 前端基础校验
            if (!username) {
                showError('请输入用户名或手机号');
                DOM.username.focus();
                return;
            }

            if (!password) {
                showError('请输入密码');
                DOM.password.focus();
                return;
            }

            if (password.length < 6) {
                showError('密码长度不能少于6位');
                DOM.password.focus();
                return;
            }

            await performLogin(username, password);
        });

        /** 管理员登录按钮事件（事件委托） */
        DOM.adminBtns.forEach(btn => {
            btn.addEventListener('click', async function() {
                const username = this.dataset.admin;
                const password = this.dataset.password;
                await performLogin(username, password);
            });
        });

        /** 回车键快捷登录（已由表单提交事件覆盖） */

        /** 输入框聚焦时清空错误 */
        DOM.username.addEventListener('focus', clearError);
        DOM.password.addEventListener('focus', clearError);

        // ========== 已登录用户自动跳转 ==========

        (function checkExistingSession() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            const token = localStorage.getItem('token');

            if (user && token) {
                // 验证 token 是否有效（可选：调用 /api/verify 接口）
                // 简单策略：直接跳转，如果 token 无效会被中间件拦截
                redirectToDashboard(user);
            }
        })();

        // ========== 暴露全局方法（供 HTML 内联调用） ==========
        window.adminLogin = performLogin;

        console.log('🌿 绿屿二手登录页面已加载');

    })();
</script>
</body>
</html>
