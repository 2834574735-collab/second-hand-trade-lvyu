<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布商品 - 绿屿二手</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .publish-container { max-width: 700px; margin: 40px auto; padding: 0 20px; }
        .publish-card { background: white; border-radius: 24px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .publish-card h2 { font-size: 24px; color: #3b4a4a; margin-bottom: 24px; }
        .publish-card h2 span { background: linear-gradient(135deg, #4caf7f 0%, #7ec8e0 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; color: #5a6a6a; margin-bottom: 6px; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; border: 1px solid #d4e2da; border-radius: 12px; font-size: 15px; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #4caf7f; box-shadow: 0 0 0 3px rgba(76,175,127,0.12); }
        .form-group textarea { min-height: 100px; resize: vertical; font-family: inherit; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn-submit { width: 100%; padding: 14px; font-size: 16px; margin-top: 10px; }
        .image-upload-area { border: 2px dashed #d4e2da; border-radius: 16px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .image-upload-area:hover { border-color: #4caf7f; background: #f8fcf9; }
        .image-upload-area .emoji { font-size: 40px; display: block; margin-bottom: 10px; }
        .image-upload-area p { color: #7a8a8a; margin: 0; font-size: 14px; }
        .image-preview { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
        .image-preview .preview-item { width: 80px; height: 80px; border-radius: 12px; overflow: hidden; border: 1px solid #e0ede6; position: relative; background: #f8fcf9; display: flex; align-items: center; justify-content: center; font-size: 32px; }
        .image-preview .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .image-preview .preview-item .remove-btn { position: absolute; top: -6px; right: -6px; background: #f28b82; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .image-preview .preview-item .remove-btn:hover { background: #e57373; }
        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a href="index.html" class="logo">🌿 绿屿</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="cart.html">购物车</a>
            <a href="orders.html">我的订单</a>
            <a href="publish.html" style="color:#4caf7f;">发布闲置</a>
            <a href="my-products.html">我的商品</a>
            <span class="user-section">
                    <a href="#" id="authLink" onclick="goToProfile()">登录</a>
                    <span class="separator" id="separator" style="display:none;">|</span>
                    <a href="#" id="logoutLink" style="display:none;" onclick="logout()">退出</a>
                </span>
        </div>
    </div>
</nav>

<div class="publish-container">
    <div class="publish-card">
        <h2>📦 <span>发布闲置</span></h2>
        <form id="publishForm" onsubmit="handleSubmit(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>商品标题 *</label>
                    <input type="text" id="title" placeholder="请输入商品名称" required>
                </div>
                <div class="form-group">
                    <label>分类 *</label>
                    <select id="category" required>
                        <option value="">请选择</option>
                        <option value="数码">数码</option>
                        <option value="服饰">服饰</option>
                        <option value="图书">图书</option>
                        <option value="生活">生活用品</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>价格 (元) *</label>
                    <input type="number" id="price" placeholder="0.00" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label>库存 *</label>
                    <input type="number" id="stock" placeholder="数量" min="1" required>
                </div>
            </div>
            <div class="form-group">
                <label>新旧程度 *</label>
                <select id="condition" required>
                    <option value="">请选择</option>
                    <option value="全新">全新</option>
                    <option value="几乎全新">几乎全新</option>
                    <option value="有使用痕迹">有使用痕迹</option>
                    <option value="有瑕疵">有瑕疵</option>
                </select>
            </div>
            <div class="form-group">
                <label>商品描述</label>
                <textarea id="description" placeholder="请描述商品的详细信息..."></textarea>
            </div>

            <!-- 图片上传 -->
            <div class="form-group">
                <label>商品图片</label>
                <div class="image-upload-area" id="imageUploadArea" onclick="document.getElementById('fileInput').click()">
                    <span class="emoji">🖼️</span>
                    <p>点击上传图片（最多9张）</p>
                </div>
                <input type="file" id="fileInput" multiple accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
                <div class="image-preview" id="imagePreview"></div>
                <div id="uploadStatus" style="font-size:13px;color:#7a8a8a;margin-top:8px;"></div>
            </div>

            <button type="submit" class="btn btn-primary btn-submit" id="submitBtn">🚀 发布商品</button>
        </form>
        <div id="errorMsg" style="color:#f28b82;font-size:14px;margin-top:12px;text-align:center;"></div>
    </div>
</div>

<script src="js/request.js"></script>

<script>
    // ========== 全局变量 ==========
    let imageUrls = [];
    let editId = null; // 编辑模式下的商品 ID

    // ========== 检查登录状态 ==========
    function checkAuth() {
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            alert('请先登录');
            window.location.href = 'login.html';
            return false;
        }
        return true;
    }

    // ========== 退出登录 ==========
    function logout() {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('token');
        window.location.href = 'login.html';
    }

    // ========== 跳转个人中心 ==========
    function goToProfile() {
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = 'login.html';
            return;
        }
        if (currentUser.role === 'admin') {
            window.location.href = 'admin.html';
        } else {
            window.location.href = 'profile.html';
        }
    }

    // ========== 更新导航栏 ==========
    function updateNavBar() {
        const u = JSON.parse(localStorage.getItem('currentUser'));
        const authLink = document.getElementById('authLink');
        const logoutLink = document.getElementById('logoutLink');
        const separator = document.getElementById('separator');

        if (u) {
            authLink.textContent = u.nickname;
            authLink.style.color = u.role === 'admin' ? '#ff9800' : '#4caf7f';
            logoutLink.style.display = 'inline';
            if (separator) separator.style.display = 'inline';
        } else {
            authLink.textContent = '登录';
            authLink.style.color = '';
            logoutLink.style.display = 'none';
            if (separator) separator.style.display = 'none';
        }
    }

    // ========== 图片上传 ==========
    async function handleFileSelect(event) {
        const files = event.target.files;
        if (!files.length) return;

        // 限制最多 9 张
        if (imageUrls.length + files.length > 9) {
            alert('最多上传 9 张图片');
            return;
        }

        const formData = new FormData();
        for (let file of files) {
            formData.append('images', file);
        }

        document.getElementById('uploadStatus').textContent = '⏳ 上传中...';

        try {
            const token = localStorage.getItem('token');
            const response = await fetch('http://localhost:3000/api/upload-multiple', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                },
                body: formData
            });

            const result = await response.json();

            if (result.success) {
                imageUrls = imageUrls.concat(result.data.urls);
                renderImagePreview();
                document.getElementById('uploadStatus').textContent = `✅ 已上传 ${imageUrls.length} 张图片`;
            } else {
                alert(result.message || '上传失败');
                document.getElementById('uploadStatus').textContent = '❌ 上传失败';
            }
        } catch (error) {
            console.error('上传失败:', error);
            alert('图片上传失败: ' + error.message);
            document.getElementById('uploadStatus').textContent = '❌ 上传失败';
        }
    }

    // ========== 渲染图片预览 ==========
    function renderImagePreview() {
        const container = document.getElementById('imagePreview');
        container.innerHTML = imageUrls.map((url, index) => `
                <div class="preview-item">
                    <img src="${url}" alt="商品图片">
                    <button class="remove-btn" onclick="removeImage(${index})">×</button>
                </div>
            `).join('');
    }

    // ========== 删除图片 ==========
    function removeImage(index) {
        imageUrls.splice(index, 1);
        renderImagePreview();
        document.getElementById('uploadStatus').textContent = imageUrls.length ? `✅ 已上传 ${imageUrls.length} 张图片` : '';
    }

    // ========== 处理表单提交（发布/编辑） ==========
    async function handleSubmit(e) {
        e.preventDefault();

        if (!checkAuth()) return;

        const title = document.getElementById('title').value.trim();
        const category = document.getElementById('category').value;
        const description = document.getElementById('description').value.trim();
        const price = parseFloat(document.getElementById('price').value);
        const stock = parseInt(document.getElementById('stock').value);
        const condition = document.getElementById('condition').value;

        // 校验
        if (!title || !category || !price || !stock || !condition) {
            document.getElementById('errorMsg').textContent = '请填写所有必填项';
            return;
        }

        if (price < 0) {
            document.getElementById('errorMsg').textContent = '价格不能为负数';
            return;
        }

        const data = {
            title,
            category,
            description,
            price,
            stock,
            condition,
            images: imageUrls
        };

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.textContent = '⏳ 提交中...';
        submitBtn.classList.add('loading');
        document.getElementById('errorMsg').textContent = '';

        try {
            let result;
            if (editId) {
                // 编辑模式
                result = await put(`/products/${editId}`, data);
                alert('商品更新成功！');
            } else {
                // 发布模式
                result = await post('/products', data);
                alert('商品发布成功！');
            }
            window.location.href = 'my-products.html';
        } catch (error) {
            document.getElementById('errorMsg').textContent = error.message || '操作失败，请重试';
            submitBtn.textContent = editId ? '🔄 更新商品' : '🚀 发布商品';
            submitBtn.classList.remove('loading');
        }
    }

    // ========== 加载编辑数据（如果有 id 参数） ==========
    async function loadEditData() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) return;

        editId = parseInt(id);
        document.querySelector('.publish-card h2').innerHTML = '✏️ <span>编辑商品</span>';
        document.getElementById('submitBtn').textContent = '🔄 更新商品';

        try {
            const result = await get(`/products/${id}`);
            const product = result.data;

            document.getElementById('title').value = product.title || '';
            document.getElementById('category').value = product.category || '';
            document.getElementById('description').value = product.description || '';
            document.getElementById('price').value = product.price || '';
            document.getElementById('stock').value = product.stock || '';
            document.getElementById('condition').value = product.condition || '';

            // 图片
            if (product.image && product.image !== '📦') {
                imageUrls = [product.image];
                renderImagePreview();
                document.getElementById('uploadStatus').textContent = '✅ 已上传 1 张图片';
            }
        } catch (error) {
            console.error('加载商品失败:', error);
            alert('加载商品数据失败: ' + error.message);
        }
    }

    // ========== 初始化 ==========
    updateNavBar();
    loadEditData();

    // 暴露全局函数
    window.logout = logout;
    window.goToProfile = goToProfile;
    window.removeImage = removeImage;
    window.handleFileSelect = handleFileSelect;
    window.handleSubmit = handleSubmit;
</script>
</body>
</html>
